{% extends "base.html" %}
{% block title %}Scanning · MORTIS{% endblock %}
{% block content %}
<section class="card narrow">
  <h1>Scanning {{ scan.target_url }}</h1>
  <p class="muted">MORTIS is running the selected checks. This page updates automatically.</p>

  <div class="progress-track"
       id="progress-bar"
       role="progressbar"
       aria-label="Scan progress"
       aria-valuemin="0"
       aria-valuemax="100"
       aria-valuenow="0">
    <div class="progress-fill" id="progress-fill" style="width: 0%;"></div>
  </div>
  <p id="progress-label" aria-live="polite">Starting…</p>

  <p id="progress-error" class="alert error" style="display:none;"></p>
</section>

<script>
(function () {
  const statusUrl = "{{ url_for('main.scan_status', scan_id=scan.id) }}";
  const fill = document.getElementById("progress-fill");
  const bar = document.getElementById("progress-bar");
  const label = document.getElementById("progress-label");
  const errorBox = document.getElementById("progress-error");

  function poll() {
    fetch(statusUrl)
      .then((response) => response.json())
      .then((data) => {
        const total = data.modules_total || 0;
        const done = data.modules_done || 0;

        if (data.status === "completed") {
          label.textContent = "Scan complete. Redirecting…";
          window.location.href = data.results_url;
          return;
        }
        if (data.status === "failed") {
          label.textContent = "Scan failed.";
          errorBox.textContent = "The scan could not finish. Redirecting to the error details…";
          errorBox.style.display = "block";
          window.location.href = data.results_url;
          return;
        }
        if (data.status === "reporting") {
          fill.style.width = "100%";
          bar.setAttribute("aria-valuenow", 100);
          label.textContent = "Scan complete - Generating AI report…";
          setTimeout(poll, 400);
          return;
        }

        if (data.current_module) {
          // 1-based position: the module currently running is "current of total".
          const current = total > 0 ? Math.min(done + 1, total) : 0;
          const percent = total > 0 ? Math.round((current / total) * 100) : 0;
          fill.style.width = percent + "%";
          bar.setAttribute("aria-valuenow", percent);
          label.textContent = `Running module: ${data.current_module} (${current}/${total})`;
        } else {
          const percent = total > 0 ? Math.round((done / total) * 100) : 0;
          fill.style.width = percent + "%";
          bar.setAttribute("aria-valuenow", percent);
          label.textContent = `${done}/${total} modules complete`;
        }
        setTimeout(poll, 400);
      })
      .catch(() => setTimeout(poll, 1500));
  }

  poll();
})();
</script>
{% endblock %}
